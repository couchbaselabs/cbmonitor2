apiVersion: 1

# The `prometheus` and `cbdatasource` datasources are managed by the
# cbmonitor app plugin itself (reconciled at runtime from app jsonData via
# the Grafana HTTP API). Don't add them back here or you'll get duplicates.
datasources:
- name: ProxyPrometheus
  uid: proxyprometheus
  type: prometheus
  access: proxy
  url: ${PROXY_PROMETHEUS_URL}
  basicAuth: false
  isDefault: false
  jsonData:
    cacheLevel: High
    httpMethod: GET
    prometheusType: Mimir
    prometheusVersion: 2.9.1
  secureJsonData: {}
