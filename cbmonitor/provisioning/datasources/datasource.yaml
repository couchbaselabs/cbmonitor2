apiVersion: 1

datasources:
- name: cbdatasource
  uid: cbdatasource
  type: couchbase-datasource
  access: proxy
  jsonData:
    host: ${COUCHBASE_HOST}
    username: ${COUCHBASE_USERNAME}
  secureJsonData:
    password: ${COUCHBASE_PASSWORD}
- name: Prometheus
  uid: prometheus
  type: prometheus
  access: proxy
  url: ${PROMETHEUS_URL}
  basicAuth: false
  isDefault: true
  jsonData:
    cacheLevel: High
    httpMethod: POST
    prometheusType: Mimir
    prometheusVersion: 2.9.1
  secureJsonData: {}
- name: Showfast
  type: yesoreyeram-infinity-datasource
  access: proxy
  url: ${SHOWFAST_URL}
  basicAuth: false
  isDefault: false
  jsonData:
    tlsSkipVerify: true
    allowDangerousHTTPMethods: false
  secureJsonData: {}
 