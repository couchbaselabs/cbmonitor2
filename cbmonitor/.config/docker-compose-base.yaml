services:
  grafana:
    user: root
    container_name: 'cbmonitor'

    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.4.2}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
        VERSION: ${VERSION:-0.0.1}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    ports:
      - 3000:3000/tcp
      - 2345:2345/tcp # delve
    security_opt:
      - 'apparmor:unconfined'
      - 'seccomp:unconfined'
    cap_add:
      - SYS_PTRACE
    volumes:
      - ../dist:/var/lib/grafana/plugins/cbmonitor
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/cbmonitor
      - ../../couchbase-datasource/couchbase-datasource/dist:/var/lib/grafana/plugins/couchbase-datasource

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: ${GF_LOG_FILTERS:-plugin.cbmonitor:info}
      GF_LOG_LEVEL: ${GF_LOG_LEVEL:-info}
      GF_DATAPROXY_LOGGING: ${GF_DATAPROXY_LOGGING:-1}
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: ${GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS:-cbmonitor}
      GF_SECURITY_ALLOW_EMBEDDING: ${GF_SECURITY_ALLOW_EMBEDDING:-true} # TODO: Fix this properly
      GF_SECURITY_COOKIE_SAMESITE: ${GF_SECURITY_COOKIE_SAMESITE:-lax} # TODO: Fix this properly

      # Two flags must align for the plugin's `iam` block in plugin.json to take effect.
      # Without BOTH set, Grafana never injects GF_PLUGIN_APP_CLIENT_SECRET, and
      # the in-app datasource reconciler reports `reconciliation.status: "disabled"`.
      GF_AUTH_MANAGED_SERVICE_ACCOUNTS_ENABLED: 'true'
      GF_FEATURE_TOGGLES_ENABLE: ${GF_FEATURE_TOGGLES_ENABLE:-externalServiceAccounts}

      # Couchbase credentials are consumed by:
      # 1. provisioning/datasources/datasource.yaml (couchbase-datasource plugin)
      # 2. provisioning/plugins/apps.yaml
      COUCHBASE_CONNECTION_STRING: ${COUCHBASE_CONNECTION_STRING:-couchbase://host.docker.internal:8091}
      COUCHBASE_USERNAME: ${COUCHBASE_USERNAME:-Administrator}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD:-password}
      COUCHBASE_BUCKET: ${COUCHBASE_BUCKET:-showfast}
      COUCHBASE_SNAPSHOT_BUCKET: ${COUCHBASE_SNAPSHOT_BUCKET:-metadata}

      # Feature toggles bootstrapped into the cbmonitor plugin settings
      CBMONITOR_SNAPSHOTS_ENABLED: ${CBMONITOR_SNAPSHOTS_ENABLED:-true}
      CBMONITOR_COUCHBASE_DS_ENABLED: ${CBMONITOR_COUCHBASE_DS_ENABLED:-false}
      CBMONITOR_PROMETHEUS_DS_ENABLED: ${CBMONITOR_PROMETHEUS_DS_ENABLED:-true}
      CBMONITOR_PROMETHEUS_DS_IS_DEFAULT: ${CBMONITOR_PROMETHEUS_DS_IS_DEFAULT:-true}
